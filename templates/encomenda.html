{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recanto do Pão</title>
  <link rel="shortcut icon" href="{% static 'images/Recanto.ico' %}" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="page-encomenda container">

  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="/home/">Recanto do Pão</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Alternar navegação">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="/sobre_nos">Sobre nós</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/cardapio">Cardápio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/novidades">Novidades</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/encomenda">Encomenda</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/contato">Contato</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="form-container">
    <h1>Faça seu Pedido</h1>
    <form class="row g-3" action="{% url 'encomenda' %}" method="POST">
      {% csrf_token %}
      
      <div class="col-md-6">
        <label for="nome_da_pessoa" class="form-label">Nome</label>
        <input type="text" class="form-control" name="nome_da_pessoa" maxlength="100" required>
      </div>
      
      <div class="col-md-6">
        <label for="numero_de_telefone" class="form-label">Número de Telefone</label>
        <input type="number" class="form-control" name="numero_de_telefone" maxlength="15" required>
      </div>
      
      <div class="col-12">
        <label for="produtos_encomendados" class="form-label">Produtos</label>
        <textarea class="form-control" name="produtos_encomendados" required cols="50" rows="4">{% if produtos_texto %}{{produtos_texto}}{% endif %}</textarea>
      </div>
      
      <div class="col-12">
        <label for="endereço_da_entrega" class="form-label">Endereço </label>
        <input type="text" class="form-control" name="endereço_da_entrega" required>
      </div>

      <div class="col-md-4">
        <label for="forma_de_pagamento" class="form-label">Forma de Pagamento</label>
        <select class="form-select" name="forma_de_pagamento" required>
          <option value="pix">Pix</option>
          <option value="cartao">Cartão</option>
          <option value="dinheiro">Dinheiro</option>
        </select>
      </div>
      
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Enviar</button>
      </div>
    </form>
    
    {% if mensagem %}
      <div class="mensagem-sucesso">
        {{mensagem}}
      </div>
    {% endif %}
  </div>

  <div class="toast" id="toast"></div>

  <script>
    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show ' + (type || '');
      clearTimeout(t._hide);
      t._hide = setTimeout(function() { t.className = 'toast'; }, 3000);
    }

    (function() {
      if (localStorage.getItem('cliente_cadastrado') === 'true') {
        var nome = localStorage.getItem('cliente_nome');
        var telefone = localStorage.getItem('cliente_telefone');
        var rua = localStorage.getItem('cliente_rua');
        var bairro = localStorage.getItem('cliente_bairro');

        if (nome) {
          var nomeField = document.querySelector('input[name="nome_da_pessoa"]');
          if (nomeField) nomeField.value = nome;
        }
        if (telefone) {
          var telField = document.querySelector('input[name="numero_de_telefone"]');
          if (telField) telField.value = telefone;
        }
        if (rua || bairro) {
          var endField = document.querySelector('input[name="endereço_da_entrega"]');
          if (endField) endField.value = (rua || '') + (rua && bairro ? ', ' : '') + (bairro || '');
        }
      }
    })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</body>
</html>
