{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recanto do Pão</title>
  <link rel="shortcut icon" href="{% static 'images/Recanto.ico' %}" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="page-novidades">
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="/home/">Recanto do Pão</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Alternar navegação">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="/sobre_nos">Sobre nós</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/cardapio">Cardápio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/novidades">Novidades</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/encomenda">Encomenda</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/contato">Contato</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="main-content container-fluid">
    <h1>Novidades</h1>
    <div class="row">
      {% for produto in lista_produtos %}
      <div class="card" style="width: 18rem;">
        <img src="{{ produto.foto_do_produto.url }}" class="card-img-top" alt="">
        <div class="card-body">
          <h5 class="card-title">{{produto.nome_do_produto}}</h5>
          <p class="card-text">{{produto.descricao}}</p>
          <p class="card-preco">
            R$ {{produto.preco}}
          </p>
          <button class="btn btn-primary" onclick="openModal('{{ produto.foto_do_produto.url }}', '{{produto.nome_do_produto}}', '{{produto.descricao}}', '{{produto.preco}}')">Ver detalhes</button>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <img id="modal-img" src="" alt="">
      <h5 id="modal-title"></h5>
      <p id="modal-desc"></p>
      <p id="modal-price"></p>
      <button class="modal-close" onclick="closeModal()">Fechar</button>
    </div>
  </div>

  <script>
    function openModal(image, title, description, price) {
      document.getElementById('modal-img').src = image;
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-desc').textContent = description;
      document.getElementById('modal-price').textContent = 'R$ ' + price;
      document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
